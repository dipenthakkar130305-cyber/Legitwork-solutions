<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0D4C73" />

        <!-- Primary Meta Tags -->
        <meta name="title" content="LegitWork Solutions - Labour Law Compliance & HR Services India" />
        <meta name="description" content="LegitWork Solutions LLP - Leading labour law compliance, payroll outsourcing, and HR consulting services in India. Trusted by 100+ companies for statutory compliance." />
        <meta name="robots" content="index, follow" />

        <!-- Canonical URL -->
        <link rel="canonical" href="https://legitworksolutions.com/" />

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />

        <!-- PWA Manifest -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

        <!-- Preconnect for Performance -->
        <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
        <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
        <link rel="dns-prefetch" href="https://images.unsplash.com" />
        <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preconnect" href="https://images.unsplash.com" />

        <!-- OpenGraph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://legitworksolutions.com/" />
        <meta property="og:title" content="LegitWork Solutions - Labour Law Compliance & HR Services India" />
        <meta property="og:description" content="Leading labour law compliance, payroll outsourcing, and HR consulting services in India. Trusted by 100+ companies for statutory compliance." />
        <meta property="og:image" content="https://legitworksolutions.com/og-image.png" />
        <meta property="og:site_name" content="LegitWork Solutions" />
        <meta property="og:locale" content="en_IN" />

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:site" content="@legitwork" />
        <meta name="twitter:title" content="LegitWork Solutions - Labour Law Compliance & HR Services India" />
        <meta name="twitter:description" content="Leading labour law compliance, payroll outsourcing, and HR consulting services in India. Trusted by 100+ companies for statutory compliance." />
        <meta name="twitter:image" content="https://legitworksolutions.com/og-image.png" />

        <!-- Geo Tags for Local SEO -->
        <meta name="geo.region" content="IN-GJ" />
        <meta name="geo.placename" content="Ahmedabad" />

        <!-- Title (dynamically updated by react-helmet-async per-page) -->
        <title>LegitWork Solutions - Labour Law Compliance & HR Services India</title>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
